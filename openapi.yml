openapi: "3.1.0"
info:
  title: Clawkson API
  description: API for the Clawkson AI assistant platform
  version: 0.1.0
  license:
    name: MIT

servers:
  - url: http://localhost:47821
    description: Local development server

paths:
  # ── Agents ──────────────────────────────────────────────────

  /api/agents:
    get:
      summary: List all agents
      operationId: listAgents
      tags: [Agents]
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      summary: Create a new agent
      operationId: createAgent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "200":
          description: The created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /api/agents/{id}:
    get:
      summary: Get an agent by ID
      operationId: getAgent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
    patch:
      summary: Update an agent
      operationId: patchAgent
      tags: [Agents]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchAgentRequest"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
    delete:
      summary: Delete an agent
      operationId: deleteAgent
      tags: [Agents]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Conversations ───────────────────────────────────────────

  /api/conversations:
    get:
      summary: List all conversations
      operationId: listConversations
      tags: [Conversations]
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      summary: Create a new conversation
      operationId: createConversation
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "200":
          description: The created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /api/conversations/{id}:
    get:
      summary: Get a conversation by ID
      operationId: getConversation
      tags: [Conversations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /api/conversations/{id}/messages:
    get:
      summary: List messages in a conversation
      operationId: listMessages
      tags: [Conversations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      summary: Send a message in a conversation
      operationId: sendMessage
      tags: [Conversations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: The sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /api/conversations/{id}/chat:
    post:
      summary: Send a message and get an AI response (blocking)
      operationId: chat
      tags: [Conversations]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: User message and assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "404":
          description: Conversation not found

  /api/conversations/{id}/chat/stream:
    post:
      summary: Send a message and stream the AI response as SSE
      operationId: chatStream
      tags: [Conversations]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream – each event is JSON with `delta`, `done`, or `error`
          content:
            text/event-stream:
              schema:
                type: string

  # ── Connectors ──────────────────────────────────────────────

  /api/connectors:
    get:
      summary: List all connectors
      operationId: listConnectors
      tags: [Connectors]
      responses:
        "200":
          description: List of connectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Connector"
    post:
      summary: Create a connector
      operationId: createConnector
      tags: [Connectors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConnectorRequest"
      responses:
        "200":
          description: The created connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"

  /api/connectors/{id}:
    get:
      summary: Get a connector by ID
      operationId: getConnector
      tags: [Connectors]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"
        "404":
          description: Not found
    patch:
      summary: Update a connector (e.g. toggle enabled)
      operationId: patchConnector
      tags: [Connectors]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchConnectorRequest"
      responses:
        "200":
          description: The updated connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"
        "404":
          description: Not found
    delete:
      summary: Delete a connector
      operationId: deleteConnector
      tags: [Connectors]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Knowledge Base ──────────────────────────────────────────

  /api/knowledge:
    get:
      summary: List all knowledge entries
      operationId: listKnowledgeEntries
      tags: [Knowledge Base]
      responses:
        "200":
          description: List of knowledge entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntry"
    post:
      summary: Create a knowledge entry
      operationId: createKnowledgeEntry
      tags: [Knowledge Base]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeEntryRequest"
      responses:
        "200":
          description: The created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"

  /api/knowledge/{id}:
    get:
      summary: Get a knowledge entry by ID
      operationId: getKnowledgeEntry
      tags: [Knowledge Base]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The knowledge entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"

  # ── Tools ───────────────────────────────────────────────────

  /api/tools:
    get:
      summary: List all tools
      operationId: listTools
      tags: [Tools]
      responses:
        "200":
          description: List of tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tool"
    post:
      summary: Create a tool
      operationId: createTool
      tags: [Tools]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToolRequest"
      responses:
        "200":
          description: The created tool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"

  /api/tools/{id}:
    get:
      summary: Get a tool by ID
      operationId: getTool
      tags: [Tools]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The tool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"

  # ── LLM Connectors ──────────────────────────────────────────────

  /api/llm-connectors:
    get:
      summary: List all LLM connectors (API keys masked)
      operationId: listLlmConnectors
      tags: [LLM Connectors]
      responses:
        "200":
          description: List of connectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LlmConnector"
    post:
      summary: Create an LLM connector
      operationId: createLlmConnector
      tags: [LLM Connectors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLlmConnectorRequest"
      responses:
        "200":
          description: Created connector (API key masked)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConnector"

  /api/llm-connectors/{id}:
    get:
      summary: Get an LLM connector
      operationId: getLlmConnector
      tags: [LLM Connectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConnector"
        "404":
          description: Not found
    patch:
      summary: Update an LLM connector
      operationId: patchLlmConnector
      tags: [LLM Connectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchLlmConnectorRequest"
      responses:
        "200":
          description: Updated connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConnector"
        "404":
          description: Not found
    delete:
      summary: Delete an LLM connector
      operationId: deleteLlmConnector
      tags: [LLM Connectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Settings ────────────────────────────────────────────────────

  /api/settings:
    get:
      summary: Get application settings
      operationId: getSettings
      tags: [Settings]
      responses:
        "200":
          description: Application settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      summary: Update application settings
      operationId: patchSettings
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchSettingsRequest"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    # ── Agent ──────────────────────────────────────────────────

    Agent:
      type: object
      required: [id, name, description, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/AgentStatus"
        llm_connector_id:
          type: string
          format: uuid
          nullable: true
        system_prompt:
          type: string
          nullable: true
        temperature:
          type: number
          format: double
          nullable: true
          minimum: 0
          maximum: 2
        max_tokens:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentStatus:
      type: string
      enum: [online, offline, busy, error]

    CreateAgentRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        llm_connector_id:
          type: string
          format: uuid
          nullable: true
        system_prompt:
          type: string
          nullable: true
        temperature:
          type: number
          nullable: true
        max_tokens:
          type: integer
          nullable: true

    PatchAgentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        llm_connector_id:
          type: string
          format: uuid
          nullable: true
        system_prompt:
          type: string
          nullable: true
        temperature:
          type: number
          nullable: true
        max_tokens:
          type: integer
          nullable: true
        status:
          $ref: "#/components/schemas/AgentStatus"

    # ── Conversation ───────────────────────────────────────────

    Conversation:
      type: object
      required: [id, title, agent_id, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        agent_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateConversationRequest:
      type: object
      required: [title, agent_id]
      properties:
        title:
          type: string
        agent_id:
          type: string
          format: uuid

    Message:
      type: object
      required: [id, conversation_id, role, content, created_at]
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/MessageRole"
        content:
          type: string
        created_at:
          type: string
          format: date-time

    MessageRole:
      type: string
      enum: [user, assistant, system, tool]

    SendMessageRequest:
      type: object
      required: [content, role]
      properties:
        content:
          type: string
        role:
          $ref: "#/components/schemas/MessageRole"

    # ── Connector ──────────────────────────────────────────────

    Connector:
      type: object
      required: [id, name, connector_type, enabled, config, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        connector_type:
          $ref: "#/components/schemas/ConnectorType"
        enabled:
          type: boolean
        config:
          type: object
        created_at:
          type: string
          format: date-time

    ConnectorType:
      type: string
      enum: [telegram, gmail, slack, custom]

    CreateConnectorRequest:
      type: object
      required: [name, connector_type, config]
      properties:
        name:
          type: string
        connector_type:
          $ref: "#/components/schemas/ConnectorType"
        config:
          type: object

    PatchConnectorRequest:
      type: object
      properties:
        enabled:
          type: boolean

    TelegramConnectorConfig:
      type: object
      required: [bot_token]
      description: Configuration fields for a Telegram connector
      properties:
        bot_token:
          type: string
          description: Telegram Bot API token (from @BotFather)

    # ── Knowledge Entry ────────────────────────────────────────

    KnowledgeEntry:
      type: object
      required: [id, title, content, tags, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateKnowledgeEntryRequest:
      type: object
      required: [title, content, tags]
      properties:
        title:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string

    # ── Tool ───────────────────────────────────────────────────

    Tool:
      type: object
      required: [id, name, description, connector_id, schema, enabled]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        connector_id:
          type: string
          format: uuid
        schema:
          type: object
        enabled:
          type: boolean

    CreateToolRequest:
      type: object
      required: [name, description, connector_id, schema]
      properties:
        name:
          type: string
        description:
          type: string
        connector_id:
          type: string
          format: uuid
        schema:
          type: object

    # ── LLM Connector ──────────────────────────────────────────

    LlmProviderType:
      type: string
      enum: [azure, open_router, open_ai, custom]
      description: The LLM provider backend type

    LlmConnector:
      type: object
      required: [id, name, provider_type, model, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        provider_type:
          $ref: "#/components/schemas/LlmProviderType"
        model:
          type: string
        api_base_url:
          type: string
          nullable: true
          description: Required for custom provider; optional for others
        azure_deployment:
          type: string
          nullable: true
          description: Azure OpenAI deployment name
        azure_api_version:
          type: string
          nullable: true
          description: Azure OpenAI API version (e.g. 2024-02-01)
        api_key_masked:
          type: string
          nullable: true
          description: Masked API key (e.g. sk-or-••••1234); never the real key
        created_at:
          type: string
          format: date-time

    CreateLlmConnectorRequest:
      type: object
      required: [name, provider_type, model, api_key]
      properties:
        name:
          type: string
        provider_type:
          $ref: "#/components/schemas/LlmProviderType"
        model:
          type: string
        api_key:
          type: string
          description: Plain-text API key (stored in-memory, never persisted)
        api_base_url:
          type: string
          nullable: true
        azure_deployment:
          type: string
          nullable: true
        azure_api_version:
          type: string
          nullable: true

    PatchLlmConnectorRequest:
      type: object
      properties:
        name:
          type: string
        provider_type:
          $ref: "#/components/schemas/LlmProviderType"
        model:
          type: string
        api_key:
          type: string
          nullable: true
        api_base_url:
          type: string
          nullable: true
        azure_deployment:
          type: string
          nullable: true
        azure_api_version:
          type: string
          nullable: true

    ChatRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: The user message content

    ChatResponse:
      type: object
      required: [user_message, assistant_message]
      properties:
        user_message:
          $ref: "#/components/schemas/Message"
        assistant_message:
          $ref: "#/components/schemas/Message"

    # ── Settings ───────────────────────────────────────────────

    Settings:
      type: object
      properties:
        default_llm_connector_id:
          type: string
          format: uuid
          nullable: true
        theme:
          type: string

    PatchSettingsRequest:
      type: object
      properties:
        default_llm_connector_id:
          type: string
          format: uuid
          nullable: true
        theme:
          type: string
