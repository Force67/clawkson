services:
  vectorchord:
    image: ghcr.io/tensorchord/vchord-postgres:pg18-v1.1.1
    restart: unless-stopped
    shm_size: 1gb
    ports:
      - "127.0.0.1:${CLAWKSON_VECTORCHORD_PORT:-55435}:5432"
    environment:
      POSTGRES_USER: ${CLAWKSON_DB_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${CLAWKSON_DB_ADMIN_PASSWORD:-change-me-superuser-password}
      POSTGRES_DB: ${CLAWKSON_DB_ADMIN_DATABASE:-postgres}
    volumes:
      - vectorchord-data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d postgres
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  vectorchord-data:
